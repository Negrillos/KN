{% extends 'base.html' %}
{% block title %}KARTNATION — Nueva contraseña{% endblock %}
{% block head %}
<style>
    .auth-wrapper { min-height: calc(100vh - 120px); display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; }
    .auth-card { width: 100%; max-width: 420px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .auth-top-bar { height: 4px; background: linear-gradient(90deg, var(--green) 0%, var(--accent3) 100%); }
    .auth-body { padding: 2.5rem; }
    .auth-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--green); margin-bottom: 0.5rem; }
    .auth-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 0.03em; margin-bottom: 0.5rem; }
    .auth-subtitle { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 2rem; }
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 2.75rem; }
    .password-toggle { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0.25rem; display: flex; align-items: center; transition: color 0.2s; }
    .password-toggle:hover { color: var(--text); }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-top-bar"></div>
        <div class="auth-body">
            <div style="font-size:3rem;text-align:center;margin-bottom:1.5rem;">🔒</div>
            <div class="auth-eyebrow">Nueva contraseña</div>
            <h1 class="auth-title">Crea tu nueva contraseña</h1>
            <p class="auth-subtitle">Elige una contraseña segura de al menos 6 caracteres.</p>
            <form method="POST" action="{{ url_for('reset_password', token=token) }}">
                <div class="form-group">
                    <label for="password">Nueva contraseña</label>
                    <div class="password-wrap">
                        <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required autofocus autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePwd('password', this)" aria-label="Mostrar u ocultar contraseña">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirmar contraseña</label>
                    <div class="password-wrap">
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repite la contraseña" required autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePwd('confirm_password', this)" aria-label="Mostrar u ocultar contraseña">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Guardar nueva contraseña</button>
            </form>
        </div>
    </div>
</div>
<script>
function togglePwd(fieldId, btn) {
    const input = document.getElementById(fieldId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    const eye = btn.querySelector('svg');
    if (eye) {
        eye.innerHTML = isHidden
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
}
</script>
{% endblock %}
